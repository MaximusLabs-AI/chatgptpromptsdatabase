services:
  # API Backend
  - type: web
    name: ai-prompts-api
    runtime: node
    plan: free
    rootDir: api
    buildCommand: npm install && npm run init-db && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
    disk:
      name: data
      mountPath: /opt/render/project/src/api/data
      sizeGB: 1

  # Frontend (Static Site)
  - type: web
    name: ai-prompts-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000
    envVars:
      - key: VITE_API_BASE
        value: https://ai-prompts-api.onrender.com
